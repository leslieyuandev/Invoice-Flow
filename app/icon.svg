<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>
  <!-- Balloon body -->
  <ellipse cx="16" cy="14" rx="13" ry="13.5" fill="url(#bg)"/>
  <!-- Balloon tie knot -->
  <path d="M14.5 27.2 Q16 25 17.5 27.2 Q16 26 14.5 27.2Z" fill="#5b21b6"/>
  <line x1="16" y1="27" x2="16" y2="31" stroke="#5b21b6" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Letter H -->
  <text
    x="16" y="20"
    text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-weight="900"
    font-size="17"
    fill="white"
    letter-spacing="-0.5"
  >H</text>
  <!-- Highlight gloss -->
  <ellipse cx="11" cy="9" rx="4" ry="3" fill="white" opacity="0.18"/>
</svg>
